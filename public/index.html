    <title>The Speckled Band — A Sherlock Deduction</title>

    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Georgia, 'Times New Roman', serif;
        background: #14110d;
        color: #e8dcc0;
        /* Centre the game and respect notches on phones. */

        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);

      }
      /* Phaser (Scale.FIT) resizes its canvas to fill this box while keeping aspect. */
      #game { width: 100vw; height: 100vh; }
      #game canvas { display: block; margin: 0 auto; }
    </style>
